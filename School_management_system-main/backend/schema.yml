openapi: 3.0.3
info:
  title: Bright Future Homeschooling API
  version: 1.0.0
  description: REST API backend for Phase 1 of Bright Future Homeschooling software.
paths:
  /api/accounts/fees/:
    get:
      operationId: accounts_fees_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: program
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeeStructure'
          description: ''
    post:
      operationId: accounts_fees_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeeStructure'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FeeStructure'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FeeStructure'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeStructure'
          description: ''
  /api/accounts/fees/{id}/:
    get:
      operationId: accounts_fees_retrieve
      parameters:
