components:
  schemas:
    Assessment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        is_admission_test:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - title
    AssessmentResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student_details:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        strengths:
          type: string
          description: JSON or text detailing strengths
        weaknesses:
          type: string
          description: JSON or text detailing weaknesses
        learning_gaps:
          type: string
          description: JSON or text detailing learning gaps
        recommendations:
          type: string
        shared_with_parents:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        student:
          type: integer
        assessment:
          type: integer
      required:
      - assessment
      - created_at
      - id
      - learning_gaps
      - recommendations
      - score
      - strengths
      - student
      - student_details
      - weaknesses
    Assignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        instructions:
          type: string
        due_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true
        lesson:
          type: integer
      required:
      - created_at
      - due_date
      - id
      - instructions
      - lesson
      - title
    AssignmentSubmission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student_details:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
        file_attachment:
          type: string
          format: uri
          nullable: true
        grade:
          type: string
          nullable: true
          maxLength: 10
        teacher_feedback:
          type: string
          nullable: true
        assignment:
          type: integer
        student:
          type: integer
      required:
      - assignment
      - id
      - student
      - student_details
      - submitted_at
    Attendance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student_details:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        teacher_details:
          allOf:
          - $ref: '#/components/schemas/TeacherProfile'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AttendanceStatusEnum'
        student:
          type: integer
          nullable: true
        teacher:
          type: integer
          nullable: true
      required:
      - date
      - id
      - status_display
      - student_details
      - teacher_details
    AttendanceStatusEnum:
      enum:
      - PRESENT
      - ABSENT
      - LATE
      - LEAVE
      type: string
      description: |-
        * `PRESENT` - Present
        * `ABSENT` - Absent
        * `LATE` - Late
        * `LEAVE` - On Leave
    Classroom:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course_details:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        teacher_details:
          allOf:
          - $ref: '#/components/schemas/TeacherProfile'
          readOnly: true
        student_details:
          type: array
          items:
            $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        name:
          type: string
          maxLength: 100
        course:
          type: integer
        teacher:
          type: integer
          nullable: true
        students:
          type: array
          items:
            type: integer
      required:
      - course
      - course_details
      - id
      - name
      - student_details
      - teacher_details
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        program_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        syllabus:
          type: string
          nullable: true
        program:
          type: integer
      required:
      - code
      - id
      - name
      - program
      - program_name
    DailyProgressLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type_display:
          type: string
          readOnly: true
        evaluation_display:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/DailyProgressLogTypeEnum'
        surah_name:
          type: string
          nullable: true
          maxLength: 100
        from_ayat:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        to_ayat:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        evaluation_grade:
          $ref: '#/components/schemas/EvaluationGradeEnum'
        tarbiyah_notes:
          type: string
          nullable: true
          description: Character and behavior notes
        profile:
          type: integer
      required:
      - date
      - evaluation_display
      - evaluation_grade
      - id
      - profile
      - type
      - type_display
    DailyProgressLogTypeEnum:
      enum:
      - HIFAZ
      - NAZRA
      - TAJWEED
      - TARBIYAH
      - ISLAMIC_STUDIES
      type: string
      description: |-
        * `HIFAZ` - Hifz (Memorization)
        * `NAZRA` - Nazra (Reading)
        * `TAJWEED` - Tajweed (Rules)
        * `TARBIYAH` - Tarbiyah (Character)
        * `ISLAMIC_STUDIES` - Islamic Studies (Theory)
    DayOfWeekEnum:
      enum:
      - MON
      - TUE
      - WED
      - THU
      - FRI
      - SAT
      - SUN
      type: string
      description: |-
        * `MON` - Monday
        * `TUE` - Tuesday
        * `WED` - Wednesday
        * `THU` - Thursday
        * `FRI` - Friday
        * `SAT` - Saturday
        * `SUN` - Sunday
    DigitalDiary:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        classroom_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        homework_notes:
          type: string
          nullable: true
        announcements:
          type: string
          nullable: true
        classroom:
          type: integer
      required:
      - classroom
      - classroom_name
      - date
      - id
    EvaluationGradeEnum:
      enum:
      - EXCELLENT
      - GOOD
      - IMPROVING
      type: string
      description: |-
        * `EXCELLENT` - Excellent
        * `GOOD` - Good
        * `IMPROVING` - Needs Improvement
    Exam:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
          readOnly: true
        title:
          type: string
          maxLength: 200
        duration_minutes:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        ai_proctoring_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        course:
          type: integer
      required:
      - course
      - created_at
      - id
      - questions
      - title
    ExamAttempt:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student_details:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
