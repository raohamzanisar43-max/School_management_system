          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFeeStructure'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFeeStructure'
      security:
      - jwtAuth: []
