  /api/accounts/invoices/:
    get:
      operationId: accounts_invoices_list
      parameters:
      - in: query
        name: due_date
        schema:
          type: string
          format: date
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: payment_method
        schema:
          type: string
          enum:
          - BANK_TRANSFER
          - CASH
          - CREDIT_CARD
          - PENDING
        description: |-
          * `BANK_TRANSFER` - Bank Transfer
          * `CREDIT_CARD` - Credit / Debit Card
          * `CASH` - Cash
          * `PENDING` - Pending Payment
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - OVERDUE
          - PAID
          - UNPAID
        description: |-
          * `PAID` - Paid
          * `UNPAID` - Unpaid
          * `OVERDUE` - Overdue
      - in: query
        name: student
        schema:
          type: integer
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
          description: ''
    post:
      operationId: accounts_invoices_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invoice'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Invoice'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invoice'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
          description: ''
